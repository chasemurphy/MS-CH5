<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="app.css">

    <title>Crestron BlueSteel 2.0</title>
    <script src="https://kit.fontawesome.com/c459775def.js" crossorigin="anonymous"></script>

  </head>
  <body>
        <section id="mainHeader">
            <div class="py-0 py-md-1 py-lg-2 mb-2 mb-md-4 mb-lg-6">
            <h1>Media Systems</h1>
        </div>
        </section> 
        
        <section id="mainBody" class="container">
            <div class="row text-center justify-content-around">
                <div class="col-md-6 col-lg-4">
                    <div class="row justify-content-center">
                        <div class="mb-5">   
                            <button class="btn btn-outline-light btn-block"> 
                                <i class="fas fa-tv fa-5x light m-4"></i>
                                <h1>Video</h1>
                            </button>
                        </div> 
                    </div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="row justify-content-center">
                        <div class="mb-5">   
                            <button class="btn btn-outline-light btn-block"> 
                                <i class="fas fa-tv fa-5x light m-4"></i>
                                <h1>Audio</h1>
                            </button>
                        </div> 
                    </div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="row justify-content-center">
                        <div class="mb-5">   
                            <button class="btn btn-outline-light btn-block"> 
                                <i class="fas fa-tv fa-5x light m-4"></i>
                                <h1>Lighting</h1>
                            </button>
                        </div> 
                    </div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="row justify-content-center">
                        <div class="mb-5">   
                            <button class="btn btn-outline-light btn-block"> 
                                <i class="fas fa-tv fa-5x light m-4"></i>
                                <h1>Shades</h1>
                            </button>
                        </div> 
                    </div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="row justify-content-center">
                        <div class="mb-5">   
                            <button class="btn btn-outline-light btn-block"> 
                                <i class="fas fa-tv fa-5x light m-4"></i>
                                <h1>Climate</h1>
                            </button>
                        </div> 
                    </div>
                </div>
               



            </div>


        </section>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
  </body>
</html>
