<nav class="navbar navbar-dark">
  <div class="navbar-text">
    <i class="fa fa-angle-left"></i>
    <div class="room-info text-uppercase">
      <span class="d-block" data-ch5-textcontent="lighting.title">Lighting</span>
      <h2 class="mb-0" data-ch5-textcontent="lighting.heading">Great Room</h2>
    </div>
  </div>
  <div class="navbar-action">
    <a class="btn-link text-uppercase" data-ch5-textcontent="lighting.alllights">All Lights</a>
    <button class="navbar-toggler d-md-none" type="button" onclick="lightingModule.lightingSidebarToggle()">
      <span class="navbar-toggler-icon"></span>
    </button>
  </div>
</nav>
<section class="examples-container">
  <div class="row no-gutters">
    <div class="col-md-9">
      <ch5-list class="ch5-custom-list" maxHeight="100%" itemWidth="100%" orientation="vertical" indexId="idx"
        scrollbar="true" receiveStateSize="lighting.loads.size">
        <template>
          <div class="vertical-list-item">
            <span class="label" data-ch5-textcontent="lighting.loads.name_{{idx}}">Label</span>
            <div class="d-flex align-items-center">
              <ch5-button class="lighting-button" data-ch5-id="lighting.loads.name_{{idx}}" shape="circle"
                sendEventOnClick="lighting.loads.off_click_{{idx}}"
                iconurl="./assets/img/lighting/fa-icon-lightbulb.svg"></ch5-button>
              <ch5-slider class="lighting-slider" stretch="width" handleShape="circle" toolTipShowType="auto"
                sendEventOnChange="lighting.loads.level_change_{{idx}}" receiveStateValue="lighting.loads.level_{{idx}}"
                orientation="horizontal"></ch5-slider>
              <ch5-button class="lighting-button" data-ch5-id="lighting.loads.name_{{idx}}" shape="circle"
                sendEventOnClick="lighting.loads.on_click_{{idx}}" iconClass="fas fa-lightbulb">
              </ch5-button>
            </div>
          </div>
        </template>
      </ch5-list>
    </div>
    <aside class="col-md-3 lighting-sidebar" id="lightingSidebar">
      <ch5-select class="sidebar ch5-custom-select" class="sidebar ch5-custom-select" mode="panel" maxWidth="none"
        indexId="idx" receiveStateSize="lighting.scenes.size" noneSelectedPrompt="-+lighting.sceneTitle+-"
        receiveStateValue="NotDefinedOnPurpose" signalValueSyncTimeout="2500" receivestatetemplatevars="scenesVarTpl">
        <template ngNonBindable>
          <ch5-select-option sendEventOnClick="lighting.scenes.select_{{idx}}">
            <span>{{name}}</span>
          </ch5-select-option>
        </template>
      </ch5-select>
    </aside>
  </div>
</section>
