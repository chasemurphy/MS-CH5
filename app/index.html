<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>MS Home Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <!-- Styles -->
  <link rel="stylesheet" href="./assets/css/ch5-theme.css" />
  <link rel="stylesheet" href="./assets/css/external.css" />
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>

<body>

  <!-- ===== Header Bar ===== -->
  <header id="header-bar">
    <ch5-button id="nav-home" class="header-nav-btn hidden"
      iconClass="fas fa-home"
      label=""
      sendEventOnClick="200"
      type="default"
      shape="rectangle"
      size="regular">
    </ch5-button>
    <ch5-text id="header-title" receiveStateLabel="1"></ch5-text>
  </header>

  <!-- ===== Page Container ===== -->
  <main id="page-container">
    <div id="page-home" class="page active">
      <div class="home-content">
        <div class="tile-grid">

          <ch5-button id="tile-lighting"
            label="Lighting"
            iconClass="fas fa-lightbulb"
            iconPosition="top"
            sendEventOnClick="1"
            receiveStateSelected="1"
            noshowtype="remove"
            receiveStateShow="11"
            type="default"
            shape="rectangle"
            size="x-large"
            stretch="both">
          </ch5-button>

          <ch5-button id="tile-climate"
            label="Climate"
            iconClass="fas fa-thermometer-half"
            iconPosition="top"
            sendEventOnClick="2"
            receiveStateSelected="2"
            noshowtype="remove"
            receiveStateShow="12"
            type="default"
            shape="rectangle"
            size="x-large"
            stretch="both">
          </ch5-button>

          <ch5-button id="tile-shades"
            label="Shades"
            iconClass="fas fa-window-maximize"
            iconPosition="top"
            sendEventOnClick="3"
            receiveStateSelected="3"
            noshowtype="remove"
            receiveStateShow="13"
            type="default"
            shape="rectangle"
            size="x-large"
            stretch="both">
          </ch5-button>

          <ch5-button id="tile-av"
            label="AV"
            iconClass="fas fa-tv"
            iconPosition="top"
            sendEventOnClick="4"
            receiveStateSelected="4"
            noshowtype="remove"
            receiveStateShow="14"
            type="default"
            shape="rectangle"
            size="x-large"
            stretch="both">
          </ch5-button>

          <ch5-button id="tile-music"
            label="Music"
            iconClass="fas fa-music"
            iconPosition="top"
            sendEventOnClick="5"
            receiveStateSelected="5"
            noshowtype="remove"
            receiveStateShow="15"
            type="default"
            shape="rectangle"
            size="x-large"
            stretch="both">
          </ch5-button>

          <ch5-button id="tile-security"
            label="Security"
            iconClass="fas fa-shield-alt"
            iconPosition="top"
            sendEventOnClick="6"
            receiveStateSelected="6"
            noshowtype="remove"
            receiveStateShow="16"
            type="default"
            shape="rectangle"
            size="x-large"
            stretch="both">
          </ch5-button>

        </div>
      </div>
    </div>
    <!-- ===== Music Page ===== -->
    <div id="page-music" class="page">

      <!-- Room template (repeated by ch5-subpage-reference-list)
           Per-room join offsets: d+10, a+1, s+6
           Room 0: d401-410, a401, s401-406
           Room 1: d411-420, a402, s407-412  etc. -->
      <template id="music-room-tpl">
        <div class="room-col">

          <!-- Room Name (s401, s407, s413 …) -->
          <ch5-text class="room-name" receiveStateLabel="401"></ch5-text>

          <!-- Main content: buttons left, slider right -->
          <div class="room-body">

            <!-- Left: sources, vol buttons, off -->
            <div class="room-buttons">
              <div class="source-list">
                <ch5-button class="source-btn"
                  receiveStateLabel="402"
                  sendEventOnClick="401"
                  receiveStateSelected="401"
                  type="default" shape="rectangle" size="regular">
                </ch5-button>
                <ch5-button class="source-btn"
                  receiveStateLabel="403"
                  sendEventOnClick="402"
                  receiveStateSelected="402"
                  type="default" shape="rectangle" size="regular">
                </ch5-button>
                <ch5-button class="source-btn"
                  receiveStateLabel="404"
                  sendEventOnClick="403"
                  receiveStateSelected="403"
                  type="default" shape="rectangle" size="regular">
                </ch5-button>
                <ch5-button class="source-btn"
                  receiveStateLabel="405"
                  sendEventOnClick="404"
                  receiveStateSelected="404"
                  type="default" shape="rectangle" size="regular">
                </ch5-button>
                <ch5-button class="source-btn"
                  receiveStateLabel="406"
                  sendEventOnClick="405"
                  receiveStateSelected="405"
                  type="default" shape="rectangle" size="regular">
                </ch5-button>
              </div>

              <!-- Volume Buttons -->
              <div class="vol-controls">
                <ch5-button class="vol-btn"
                  iconClass="fas fa-volume-up"
                  sendEventOnClick="406"
                  type="default" shape="rectangle" size="regular">
                </ch5-button>
                <ch5-button class="vol-btn"
                  iconClass="fas fa-volume-down"
                  sendEventOnClick="407"
                  type="default" shape="rectangle" size="regular">
                </ch5-button>
              </div>

              <!-- Off Button -->
              <ch5-button class="off-btn"
                label="Off"
                sendEventOnClick="410"
                type="danger" shape="rectangle" size="regular">
              </ch5-button>
            </div>

            <!-- Right: vertical volume slider -->
            <div class="vol-slider-wrap">
              <ch5-slider class="vol-slider"
                orientation="vertical"
                handleShape="rounded-rectangle"
                size="regular"
                min="0" max="65535" step="1"
                sendEventOnChange="401"
                receiveStateValue="401">
              </ch5-slider>
            </div>

          </div>
        </div>
      </template>

      <!-- Zones View (default) -->
      <div id="music-zones-view" class="music-view">
        <ch5-subpage-reference-list id="music-room-list"
          widgetId="music-room-tpl"
          orientation="horizontal"
          noshowtype="remove"
          centerItems="true"
          scrollbar="true"
          loadItems="visible-only"
          booleanJoinIncrement="10"
          numericJoinIncrement="1"
          stringJoinIncrement="6"
          receiveStateNumberOfItems="400"
          indexId="idx">
        </ch5-subpage-reference-list>
      </div>

      <!-- Media Player View (toggled via d303) -->
      <div id="music-player-view" class="music-view hidden">
        <ch5-media-player id="media-player-1"
          demoMode="false"
          receiveStateCRPC="301"
          sendEventCRPC="301"
          receiveStateDeviceOffline="305"
          receiveStateMessage="302"
          receiveStateRefreshMediaPlayer="306"
          receiveStatePlayerName="300">
        </ch5-media-player>
      </div>

      <!-- Music-only bottom bar -->
      <div class="music-bottom-bar">
        <ch5-button id="nav-zones"
          label="Zones"
          iconClass="fas fa-th-list"
          sendEventOnClick="302"
          receiveStateSelected="302"
          type="default" shape="rectangle" size="regular">
        </ch5-button>
        <ch5-button id="nav-media-player"
          label="Media Player"
          iconClass="fas fa-play-circle"
          sendEventOnClick="301"
          receiveStateSelected="301"
          type="default" shape="rectangle" size="regular">
        </ch5-button>
        <ch5-button id="nav-all-off"
          label="All Off"
          sendEventOnClick="400"
          type="default" shape="rectangle" size="regular">
        </ch5-button>
      </div>

    </div>
  </main>

  <!-- ===== Bottom Navigation (unused for now) ===== -->
  <nav id="bottom-nav" class="hidden">
  </nav>

  <!-- ===== Scripts ===== -->
  <script src="./assets/vendor/cr-com-lib.js"></script>
  <script src="./assets/vendor/component.js"></script>

</body>
</html>
