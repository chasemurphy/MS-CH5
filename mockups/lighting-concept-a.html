<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lighting — Concept A: Master-Detail</title>
<style>
  :root {
    --cream: #f0ece3;
    --cream-dark: #e4dfd4;
    --cream-deep: #d6d0c4;
    --charcoal: #1c1c1c;
    --charcoal-2: #2a2a2a;
    --charcoal-3: #383838;
    --gold: #c9a84c;
    --gold-hi: #dbb85a;
    --gold-lo: #a8873a;
    --nav-bg: #181818;
    --gold-border: rgba(201, 168, 76, 0.2);
    --header-height: 64px;
  }
  @media (min-width: 900px) {
    :root { --header-height: 72px; }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    height: var(--header-height);
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }
  .home-btn {
    width: 44px; height: 44px;
    background: none; border: none;
    color: var(--cream);
    font-size: 1.5rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .home-btn:hover { background: var(--charcoal-3); }

  .room-selector {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .room-selector:hover { background: var(--charcoal-3); }
  .room-icon { font-size: 1.2rem; color: var(--gold); }
  .room-name { font-size: 1.3rem; font-weight: 600; color: var(--cream); }
  .room-chevron { color: var(--gold); font-size: 0.8rem; transition: transform 0.3s; }
  .room-chevron.open { transform: rotate(180deg); }

  .header-title {
    margin-left: auto;
    font-size: 1.1rem;
    color: var(--cream-deep);
    letter-spacing: 0.5px;
  }

  /* Room Dropdown */
  .room-dropdown-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .room-dropdown-overlay.open { opacity: 1; pointer-events: auto; }

  .room-dropdown {
    position: fixed;
    top: var(--header-height);
    left: 0; right: 0;
    background: var(--charcoal);
    padding: 20px;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
    z-index: 201;
    border-bottom: 2px solid var(--gold-border);
  }
  .room-dropdown.open { transform: translateY(0); }

  .room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    max-width: 800px;
    margin: 0 auto;
  }
  .room-option {
    padding: 14px 18px;
    background: var(--charcoal-2);
    border: 2px solid transparent;
    border-radius: 10px;
    color: var(--cream);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .room-option:hover { border-color: var(--gold-border); background: var(--charcoal-3); }
  .room-option.active { border-color: var(--gold); color: var(--gold); background: var(--charcoal-2); }

  /* Main content */
  .main-content {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Tab bar (phone only) */
  .tab-bar {
    display: none;
    background: var(--charcoal);
    border-bottom: 1px solid var(--gold-border);
  }
  .tab-bar button {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    color: var(--cream-deep);
    font-size: 1rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab-bar button.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Loads panel */
  .loads-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .loads-panel::-webkit-scrollbar { width: 6px; }
  .loads-panel::-webkit-scrollbar-track { background: transparent; }
  .loads-panel::-webkit-scrollbar-thumb { background: var(--cream-deep); border-radius: 3px; }

  /* Load Row */
  .load-row {
    background: var(--cream-dark);
    border: 1px solid rgba(28,28,28,0.1);
    border-radius: 12px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    grid-template-rows: auto auto;
    gap: 8px 16px;
    align-items: center;
    transition: background 0.2s;
  }
  .load-row:hover { background: var(--cream-deep); }

  .on-off-btn {
    grid-row: 1 / 3;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid var(--charcoal-3);
    background: var(--cream);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: all 0.2s;
    color: var(--charcoal-3);
  }
  .on-off-btn.on {
    background: var(--gold);
    border-color: var(--gold-lo);
    color: white;
    box-shadow: 0 0 12px rgba(201, 168, 76, 0.4);
  }

  .load-name {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--charcoal);
  }

  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .load-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(to right, var(--gold) var(--val), var(--cream) var(--val));
    outline: none;
    cursor: pointer;
  }
  .load-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--gold-lo);
    border: 2px solid var(--gold);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .load-pct {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    min-width: 42px;
    text-align: right;
  }

  .raise-lower {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .rl-btn {
    padding: 6px 14px;
    background: var(--cream);
    border: 1px solid rgba(28,28,28,0.15);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--charcoal-3);
    display: flex; align-items: center; gap: 4px;
    transition: all 0.15s;
    user-select: none;
  }
  .rl-btn:active {
    background: var(--gold);
    color: white;
    border-color: var(--gold-lo);
  }

  /* Scenes sidebar */
  .scenes-panel {
    width: 280px;
    border-left: 1px solid var(--gold-border);
    background: var(--cream);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  @media (min-width: 900px) {
    .scenes-panel { width: 320px; }
  }

  .scenes-title {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--gold-border);
    margin-bottom: 4px;
  }

  .scene-btn {
    padding: 16px 18px;
    background: var(--charcoal-2);
    border: 2px solid transparent;
    border-radius: 10px;
    color: var(--cream);
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .scene-btn:hover { background: var(--charcoal-3); }
  .scene-btn.active {
    background: var(--charcoal-2);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Phone responsive */
  @media (max-width: 899px) {
    .tab-bar { display: flex; }
    .scenes-panel {
      position: absolute;
      inset: 0;
      width: 100%;
      z-index: 10;
      display: none;
      padding-top: 16px;
    }
    .scenes-panel.mobile-active { display: flex; }
    .loads-panel.mobile-hidden { display: none; }
    .main-content { position: relative; }
    .load-row {
      grid-template-columns: 40px 1fr;
      grid-template-rows: auto auto auto;
      gap: 6px 12px;
      padding: 14px 16px;
    }
    .on-off-btn { grid-row: 1 / 3; width: 40px; height: 40px; }
    .slider-wrap { grid-column: 1 / -1; }
    .raise-lower { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<header>
  <button class="home-btn" title="Home">&#x2302;</button>
  <div class="room-selector" onclick="toggleRoomDropdown()">
    <span class="room-icon">&#x1F4A1;</span>
    <span class="room-name" id="currentRoom">Family Room</span>
    <span class="room-chevron" id="chevron">&#x25BC;</span>
  </div>
  <span class="header-title">Lighting</span>
</header>

<div class="room-dropdown-overlay" id="roomOverlay" onclick="toggleRoomDropdown()"></div>
<div class="room-dropdown" id="roomDropdown">
  <div class="room-grid">
    <div class="room-option active" onclick="selectRoom(this)">Family Room</div>
    <div class="room-option" onclick="selectRoom(this)">Kitchen</div>
    <div class="room-option" onclick="selectRoom(this)">Master Bedroom</div>
    <div class="room-option" onclick="selectRoom(this)">Living Room</div>
    <div class="room-option" onclick="selectRoom(this)">Dining Room</div>
    <div class="room-option" onclick="selectRoom(this)">Office</div>
    <div class="room-option" onclick="selectRoom(this)">Guest Room</div>
    <div class="room-option" onclick="selectRoom(this)">Patio</div>
  </div>
</div>

<div class="tab-bar">
  <button class="active" onclick="switchTab('loads', this)">Loads</button>
  <button onclick="switchTab('scenes', this)">Scenes</button>
</div>

<div class="main-content">
  <div class="loads-panel" id="loadsPanel"></div>
  <div class="scenes-panel" id="scenesPanel">
    <div class="scenes-title">Scenes</div>
  </div>
</div>

<script>
  const loads = [
    { name: 'Kitchen Pendants', level: 78, on: true },
    { name: 'Island Lights', level: 52, on: true },
    { name: 'Recessed Cans', level: 95, on: true },
    { name: 'Dining Chandelier', level: 38, on: false },
    { name: 'Entry Sconces', level: 67, on: true },
    { name: 'Hallway', level: 88, on: true },
    { name: 'Stairway', level: 100, on: true },
    { name: 'Pantry', level: 0, on: false },
  ];

  const scenes = ['All On', 'All Off', 'Movie Night', 'Dinner', 'Evening', 'Bright'];

  function buildLoads() {
    const panel = document.getElementById('loadsPanel');
    panel.innerHTML = '';
    loads.forEach((load, i) => {
      const row = document.createElement('div');
      row.className = 'load-row';
      row.innerHTML = `
        <button class="on-off-btn ${load.on ? 'on' : ''}" onclick="toggleLoad(${i}, this)" title="Toggle">&#x2600;</button>
        <div class="load-name">${load.name}</div>
        <div class="raise-lower">
          <button class="rl-btn">&#x25B2; Raise</button>
          <button class="rl-btn">&#x25BC; Lower</button>
        </div>
        <div class="slider-wrap" style="grid-column: 2 / -1;">
          <input type="range" class="load-slider" min="0" max="100" value="${load.level}"
            style="--val: ${load.level}%"
            oninput="updateSlider(${i}, this)">
          <span class="load-pct">${load.level}%</span>
        </div>
      `;
      panel.appendChild(row);
    });
  }

  function buildScenes() {
    const panel = document.getElementById('scenesPanel');
    panel.innerHTML = '<div class="scenes-title">Scenes</div>';
    scenes.forEach((scene, i) => {
      const btn = document.createElement('button');
      btn.className = 'scene-btn' + (i === 5 ? ' active' : '');
      btn.textContent = scene;
      btn.onclick = function() {
        document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      };
      panel.appendChild(btn);
    });
  }

  function updateSlider(i, el) {
    const val = el.value;
    el.style.setProperty('--val', val + '%');
    el.closest('.load-row').querySelector('.load-pct').textContent = val + '%';
    loads[i].level = parseInt(val);
  }

  function toggleLoad(i, btn) {
    loads[i].on = !loads[i].on;
    btn.classList.toggle('on');
  }

  function toggleRoomDropdown() {
    document.getElementById('roomOverlay').classList.toggle('open');
    document.getElementById('roomDropdown').classList.toggle('open');
    document.getElementById('chevron').classList.toggle('open');
  }

  function selectRoom(el) {
    document.querySelectorAll('.room-option').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('currentRoom').textContent = el.textContent;
    toggleRoomDropdown();
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const loads = document.getElementById('loadsPanel');
    const scenes = document.getElementById('scenesPanel');
    if (tab === 'loads') {
      loads.classList.remove('mobile-hidden');
      scenes.classList.remove('mobile-active');
    } else {
      loads.classList.add('mobile-hidden');
      scenes.classList.add('mobile-active');
    }
  }

  buildLoads();
  buildScenes();
</script>
</body>
</html>
